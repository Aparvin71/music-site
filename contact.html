<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Free Music Library</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<nav class="navbar">
<h1 class="logo">Free Music Library</h1>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html" class="active">Contact</a></li>
</ul>
</nav>
</header>

<main class="page contact-page">

<section class="contact-hero">
<h2>Contact Us</h2>
<p>Questions, feedback, or music requests? We'd love to hear from you.</p>
</section>

<section class="contact-card">

<form class="contact-form" id="contactForm">

<div class="form-row">

<div class="form-group">
<label for="name">Name</label>
<input id="name" type="text" placeholder="Your Name" required>
</div>

<div class="form-group">
<label for="email">Email</label>
<input id="email" type="email" placeholder="Your Email" required>
</div>

</div>

<div class="form-group">
<label for="subject">Subject</label>
<input id="subject" type="text" placeholder="What is this about?" required>
</div>

<div class="form-group">
<label for="contactType">Reason for Contact</label>
<select id="contactType" required>
<option value="">Select One</option>
<option>General Question</option>
<option>Suggestion</option>
<option>Song Request</option>
<option>Support</option>
</select>
</div>

<div class="form-group">
<label for="message">Message</label>
<textarea id="message" rows="6" placeholder="Write your message here..." required></textarea>
</div>

<div class="request-box">

<h3>Request a Song</h3>
<p>If there's a song you'd like added to the library, tell us about it below.</p>

<div class="form-row">

<div class="form-group">
<label for="songTitle">Song Title</label>
<input id="songTitle" type="text" placeholder="Song Title">
</div>

<div class="form-group">
<label for="artist">Artist</label>
<input id="artist" type="text" placeholder="Artist Name">
</div>

</div>

<div class="form-row">

<div class="form-group">
<label for="genre">Genre</label>
<input id="genre" type="text" placeholder="Example: Worship, Gospel, Country">
</div>

<div class="form-group">
<label for="songLink">Song Link</label>
<input id="songLink" type="url" placeholder="YouTube / Spotify / Website">
</div>

</div>

<div class="form-group">
<label for="requestNotes">Notes About the Request</label>
<textarea id="requestNotes" rows="4" placeholder="Any details about the song..."></textarea>
</div>

</div>

<div id="formMessage" class="form-message"></div>

<button type="submit" class="btn-submit">Send Message</button>

</form>

</section>

</main>

<footer>
<p>© 2026 Free Music Library</p>
</footer>

<script src="js/contact.js"></script>

</body>
</html>
