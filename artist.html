<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Artist page for the Aineo Music library." />
  <meta name="theme-color" content="#0f1115" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aineo Music" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="64x64" href="./icons/icon-64.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <title>Artist - Aineo Music</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./pwa-init.js" defer></script>
</head><body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <div class="nav-top-row">
        <div class="logo">Aineo Music</div>
        <button id="mobileNavToggle" class="mobile-nav-toggle" type="button" aria-expanded="false" aria-controls="siteNavLinks" aria-label="Toggle navigation">☰</button>
      </div>
      <ul id="siteNavLinks" class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./about.html">About</a></li>
        <li><a href="./mission.html">Mission</a></li>
        <li><a href="./install.html">Install</a></li>
        <li><a href="./contact.html">Request a Song</a></li>
      </ul>
    </nav>
  </header>
  <main class="page">
    <section id="artistPageRoot" class="artist-page-root"><section class="page-card page-hero-card"><p class="eyebrow">Artist</p><h1>Loading artist...</h1></section></section>
  </main>
    <footer class="site-footer">
    <p>© 2026 Aineo Music <span class="footer-sep">·</span> <span class="app-version">v40.3.0</span></p>
    <p class="footer-links">
      <a href="./mission.html">Mission</a>
      <a href="./install.html">Install</a>
      <a href="./changelog.html">Changelog</a>
      <a href="./feedback.html">Feedback</a>
      <a href="./artists.html">Artists</a>
      <a href="./albums.html">Albums</a>
      <a href="./lyrics-editor.html">Lyrics Editor</a>
      <a href="./admin-upload.html">Admin Upload</a>
    </p>
  </footer>
  <script>
  const root = document.getElementById("artistPageRoot");
  const params = new URLSearchParams(window.location.search);
  const artistParam = params.get("artist") || "";
  fetch(`./tracks.json?v=${Date.now()}`, { cache: "no-store" })
    .then(r => r.json())
    .then(data => {
      const tracks = Array.isArray(data) ? data : [];
      const artistTracks = tracks.filter(track => String(track.artist || "").toLowerCase() === artistParam.toLowerCase());
      if (!artistTracks.length) { root.innerHTML = `<section class="page-card page-hero-card"><p class="eyebrow">Artist</p><h1>Artist not found</h1><p class="page-lead">Head back to the library and choose another artist.</p></section>`; return; }
      const artist = artistTracks[0].artist || "Artist";
      const albums = [...new Set(artistTracks.map(track => track.album).filter(Boolean))];
      const tags = [...new Set(artistTracks.flatMap(track => Array.isArray(track.tags) ? track.tags : []))].slice(0, 10);
      const cover = artistTracks.find(track => track.cover)?.cover || "";
      root.innerHTML = `
        <section class="page-card page-hero-card artist-hero-card">
          <div class="artist-hero-layout">
            <div class="catalog-card-cover catalog-card-cover--hero">${cover ? `<img src="${cover}" alt="${artist} artwork" />` : `<div class="catalog-card-cover-fill"></div>`}</div>
            <div><p class="eyebrow">Artist</p><h1>${artist}</h1><p class="page-lead">${artistTracks.length} songs across ${albums.length} album${albums.length === 1 ? "" : "s"}.</p>
              <div class="quick-link-pills">${albums.map(album => `<a class="quick-link-pill" href="./album.html?album=${encodeURIComponent(album)}">${album}</a>`).join("")}</div>
              <div class="quick-link-pills">${tags.map(tag => `<span class="quick-link-pill quick-link-pill--static">#${tag}</span>`).join("")}</div></div>
          </div>
        </section>
        <section class="page-card utility-card">
          <div class="catalog-list">${artistTracks.map(track => `<div class="catalog-list-row"><div><h2>${track.title}</h2><p>${track.album || "Singles"}${track.scripture_references?.length ? ` • ${track.scripture_references.join(" • ")}` : ""}</p></div><div class="card-actions"><a class="action-btn secondary-btn" href="./index.html?song=${encodeURIComponent(track.title)}">Open in Player</a><a class="action-btn secondary-btn" href="./album.html?album=${encodeURIComponent(track.album || "")}">Album Page</a></div></div>`).join("")}</div>
        </section>`;
      document.title = `${artist} - Aineo Music`;
    })
    .catch(() => { root.innerHTML = `<section class="page-card page-hero-card"><p class="eyebrow">Artist</p><h1>Could not load artist page.</h1></section>`; });
  </script>
</body></html>
